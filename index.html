<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>EVAN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 背景区域 -->
        <div class="background" id="background"></div>

        <!-- 顶部装饰 -->
        <div class="top-decoration">
            <div class="stars"></div>
        </div>

        <!-- 角色区域 -->
        <div class="character-area">
            <div class="avatar-container">
                <img id="character-image" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIyNSIgZmlsbD0iI2UwZTBlMCIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNDQiIHI9IjE1IiBmaWxsPSIjYzBjMGZmIi8+PHBhdGggZD0iTTI1IDY1IEEyMCAyMCAwIDExIDY1IDY1IDk1IDk1IDAgMCAxIDI1IDY1IiBmaWxsPSIjZmZmIi8+PC9zdmc+" alt="陆沉">
                <div class="character-status">
                    <span id="status-text">在线</span>
                </div>
                <button class="change-avatar-btn" onclick="toggleAvatarSelector()">更换头像</button>
                <div class="avatar-selector" id="avatar-selector">
                    <div class="avatar-option" data-avatar="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIyNSIgZmlsbD0iI2UwZTBlMCIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNDQiIHI9IjE1IiBmaWxsPSIjYzBjMGZmIi8+PHBhdGggZD0iTTI1IDY1IEEyMCAyMCAwIDExIDY1IDY1IDk1IDk1IDAgMCAxIDI1IDY1IiBmaWxsPSIjZmZmIi8+PC9zdmc+">默认</div>
                    <div class="avatar-option" data-avatar="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Lu%20Chen%20from%20Twilight%20of%20the%20Love%2C%20evening%20suit%2C%20moonlight%2C%20red%20eyes%2C%20mysterious%20atmosphere&image_size=portrait_4_3">月光</div>
                    <div class="avatar-option" data-avatar="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Lu%20Chen%20from%20Twilight%20of%20the%20Love%2C%20casual%20style%2C%20red%20sweater%2C%20warm%20lighting%2C%20gentle%20expression&image_size=portrait_4_3">暖阳</div>
                    <div class="avatar-option" data-avatar="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Lu%20Chen%20from%20Twilight%20of%20the%20Love%2C%20formal%20suit%2C%20red%20tie%2C%20business%20setting%2C%20confident%20pose&image_size=portrait_4_3">商务</div>
                    <div class="avatar-upload">
                        <input type="file" id="avatar-upload-input" accept="image/*" style="display: none;">
                        <button class="upload-btn" onclick="document.getElementById('avatar-upload-input').click()">自定义上传</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 对话区域 -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="mobile-character-avatar">
                    <img id="mobile-character-avatar" class="mobile-avatar" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIyNSIgZmlsbD0iI2UwZTBlMCIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNDQiIHI9IjE1IiBmaWxsPSIjYzBjMGZmIi8+PHBhdGggZD0iTTI1IDY1IEEyMCAyMCAwIDExIDY1IDY1IDk1IDk1IDAgMCAxIDI1IDY1IiBmaWxsPSIjZmZmIi8+PC9zdmc+" alt="角色头像">
                    <input type="file" id="avatar-upload-input-mobile" accept="image/*" style="display: none;">
                </div>
                <div class="header-content">
                    <h2>陆沉</h2>
                    <div class="motto" id="motto">有你的地方，才是我的归处</div>
                </div>
                <div class="user-avatar-container">
                    <img id="user-avatar-desktop" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIyNSIgZmlsbD0iI2UwZTBlMCIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNDQiIHI9IjE1IiBmaWxsPSIjYzBjMGZmIi8+PHBhdGggZD0iTTI1IDY1IEEyMCAyMCAwIDExIDY1IDY1IDk1IDk1IDAgMCAxIDI1IDY1IiBmaWxsPSIjZmZmIi8+PC9zdmc+" alt="用户头像" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(184, 17, 36, 0.6);">
                    <input type="file" id="user-avatar-upload" accept="image/*" style="display: none;">
                    <button class="change-user-avatar-btn" onclick="document.getElementById('user-avatar-upload').click()" style="margin-left: 10px; padding: 4px 8px; font-size: 10px; background: rgba(184, 17, 36, 0.8); color: white; border: none; border-radius: 10px; cursor: pointer;">更换</button>
                </div>
                <div class="mobile-user-avatar">
                    <img id="user-avatar-mobile" class="mobile-avatar" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIyNSIgZmlsbD0iI2UwZTBlMCIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNDQiIHI9IjE1IiBmaWxsPSIjYzBjMGZmIi8+PHBhdGggZD0iTTI1IDY1IEEyMCAyMCAwIDExIDY1IDY1IDk1IDk1IDAgMCAxIDI1IDY1IiBmaWxsPSIjZmZmIi8+PC9zdmc+" alt="用户头像">
                </div>
                <div class="header-decoration"></div>
            </div>
            <div class="chat-messages" id="chat-messages">
                <!-- 对话消息将在这里动态生成 -->
            </div>

            <!-- 输入区域 -->
            <div class="chat-input-area">
                <div class="emoji-picker" id="emoji-picker">
                    <!-- 表情将在这里动态生成 -->
                </div>
                <input type="text" id="message-input" placeholder="输入消息...">
                <button id="emoji-button">✨</button>
                <button id="send-button">发送</button>
            </div>
        </div>

        <!-- 互动区域 -->
        <div class="interaction-area">
            <div class="interaction-header">
                <h3>互动</h3>
                <div class="header-decoration"></div>
            </div>
            <div class="interaction-buttons">
                <button class="interaction-btn" id="poke-btn">戳一戳</button>
                <button class="interaction-btn" id="hug-btn">抱抱</button>
                <button class="interaction-btn" id="kiss-btn">亲亲</button>
                <button class="interaction-btn" id="pat-btn">摸头</button>
                <button class="interaction-btn" id="letter-btn">✉️ 写信</button>
                <button class="interaction-btn" id="mailbox-btn">📮 信箱</button>
            </div>

            <!-- 模式切换 -->
            <div class="mode-selector">
                <h4>场景模式</h4>
                <div class="mode-options">
                    <button class="mode-btn morning" id="morning-btn">🌅 清晨</button>
                    <button class="mode-btn night active" id="night-btn">🌙 夜晚</button>
                </div>
            </div>

            <!-- 背景选择 -->
            <div class="background-selector">
                <h4>背景颜色</h4>
                <div class="background-options">
                    <div class="bg-option active" data-bg="default" style="background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);"></div>
                    <div class="bg-option" data-bg="crimson" style="background: linear-gradient(180deg, #2d0a0a 0%, #1a0a0a 50%, #0d0a0a 100%);"></div>
                    <div class="bg-option" data-bg="wine" style="background: linear-gradient(180deg, #2a1a2a 0%, #1a1020 50%, #100a15 100%);"></div>
                    <div class="bg-option" data-bg="scarlet" style="background: linear-gradient(180deg, #1a0a0a 0%, #100505 50%, #0a0303 100%);"></div>
                    <div class="bg-option" data-bg="ember" style="background: linear-gradient(180deg, #1a100a 0%, #100a05 50%, #0a0503 100%);"></div>
                    <div class="bg-upload">
                        <input type="file" id="bg-upload-input" accept="image/*" style="display: none;">
                        <button class="upload-btn" onclick="document.getElementById('bg-upload-input').click()">自定义上传</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- 写信弹窗 -->
        <div class="letter-modal" id="letter-modal">
            <div class="letter-modal-content">
                <div class="letter-header">
                    <div class="header-icon">✉️</div>
                    <h3>写给陆沉的信</h3>
                    <button class="close-btn" id="letter-close-btn">✕</button>
                </div>
                <div class="letter-body">
                    <div class="elegant-paper">
                        <div class="paper-border">
                            <svg class="border-svg" viewBox="0 0 400 685" preserveAspectRatio="none">
                                <rect x="15" y="15" width="370" height="655" rx="3" ry="3" fill="none" stroke="#8b6914" stroke-width="3"/>
                                <rect x="25" y="25" width="350" height="635" rx="2" ry="2" fill="none" stroke="#8b6914" stroke-width="1"/>
                                
                                <g class="corner-ornament tl">
                                    <path d="M15,15 L60,15 L60,25 L25,25 L25,60 L15,60 Z" fill="#8b6914"/>
                                    <path d="M30,30 L55,30 L55,35 L35,35 L35,55 L30,55 Z" fill="#8b6914" opacity="0.6"/>
                                </g>
                                
                                <g class="corner-ornament tr">
                                    <path d="M385,15 L340,15 L340,25 L375,25 L375,60 L385,60 Z" fill="#8b6914"/>
                                    <path d="M370,30 L345,30 L345,35 L365,35 L365,55 L370,55 Z" fill="#8b6914" opacity="0.6"/>
                                </g>
                                
                                <g class="corner-ornament bl">
                                    <path d="M15,670 L60,670 L60,660 L25,660 L25,625 L15,625 Z" fill="#8b6914"/>
                                    <path d="M30,655 L55,655 L55,650 L35,650 L35,630 L30,630 Z" fill="#8b6914" opacity="0.6"/>
                                </g>
                                
                                <g class="corner-ornament br">
                                    <path d="M385,670 L340,670 L340,660 L375,660 L375,625 L385,625 Z" fill="#8b6914"/>
                                    <path d="M370,655 L345,655 L345,650 L365,650 L365,630 L370,630 Z" fill="#8b6914" opacity="0.6"/>
                                </g>
                                
                                <line x1="60" y1="30" x2="340" y2="30" stroke="#8b6914" stroke-width="0.5" stroke-dasharray="2,4"/>
                                <line x1="60" y1="655" x2="340" y2="655" stroke="#8b6914" stroke-width="0.5" stroke-dasharray="2,4"/>
                                <line x1="30" y1="60" x2="30" y2="625" stroke="#8b6914" stroke-width="0.5" stroke-dasharray="2,4"/>
                                <line x1="370" y1="60" x2="370" y2="625" stroke="#8b6914" stroke-width="0.5" stroke-dasharray="2,4"/>
                            </svg>
                            
                            <div class="floral-top">
                                <div class="floral-line"></div>
                                <div class="floral-center">
                                    <div class="floral-icon">⚜</div>
                                </div>
                                <div class="floral-line"></div>
                            </div>
                            
                            <div class="floral-bottom">
                                <div class="floral-line"></div>
                                <div class="floral-center">
                                    <div class="floral-icon">❧</div>
                                </div>
                                <div class="floral-line"></div>
                            </div>
                        </div>
                        
                        <div class="paper-header">
                            <div class="header-ornament left">
                                <svg viewBox="0 0 40 100" class="ornament-svg">
                                    <path d="M20,10 Q30,30 20,50 Q10,70 20,90" stroke="#8b6914" stroke-width="1.5" fill="none"/>
                                    <circle cx="20" cy="25" r="4" fill="#d4a84b"/>
                                    <circle cx="20" cy="75" r="4" fill="#d4a84b"/>
                                    <path d="M15,40 Q20,50 25,40" stroke="#8b6914" stroke-width="1" fill="none"/>
                                    <path d="M15,60 Q20,50 25,60" stroke="#8b6914" stroke-width="1" fill="none"/>
                                </svg>
                            </div>
                            <div class="header-title">
                                <div class="title-text">E.V.A.N</div>
                                <div class="title-subtitle">Eternal Vampire Alliance Network</div>
                            </div>
                            <div class="header-ornament right">
                                <svg viewBox="0 0 40 100" class="ornament-svg" style="transform: scaleX(-1);">
                                    <path d="M20,10 Q30,30 20,50 Q10,70 20,90" stroke="#8b6914" stroke-width="1.5" fill="none"/>
                                    <circle cx="20" cy="25" r="4" fill="#d4a84b"/>
                                    <circle cx="20" cy="75" r="4" fill="#d4a84b"/>
                                    <path d="M15,40 Q20,50 25,40" stroke="#8b6914" stroke-width="1" fill="none"/>
                                    <path d="M15,60 Q20,50 25,60" stroke="#8b6914" stroke-width="1" fill="none"/>
                                </svg>
                            </div>
                        </div>
                        
                        <div class="paper-content-area">
                            <textarea id="letter-content" placeholder="亲爱的陆沉：&#10;&#10;    写下你想说的话..."></textarea>
                        </div>
                        
                        <div class="paper-footer">
                            <div class="signature-area">
                                <div class="signature-ornament">
                                    <span class="ornament-left">﹋</span>
                                    <span class="signature-text">With Eternal Love</span>
                                    <span class="ornament-right">﹋</span>
                                </div>
                                <div class="signature-bat">🦇</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="letter-actions">
                        <button class="send-letter-btn" id="send-letter-btn">
                            <span class="btn-icon">✉️</span>
                            <span class="btn-text">寄出信件</span>
                            <div class="sending-animation" id="sending-animation"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 回信弹窗 -->
        <div class="letter-modal" id="reply-modal">
            <div class="letter-modal-content reply">
                <div class="letter-header">
                    <div class="header-icon received">📮</div>
                    <h3>收到陆沉的回信</h3>
                    <button class="close-btn" id="reply-close-btn">✕</button>
                </div>
                <div class="letter-body">
                    <div class="mailbox-opening">
                        <div class="mailbox-container">
                            <div class="mailbox-box"></div>
                            <div class="mailbox-door">
                                <div class="mailbox-flag"></div>
                            </div>
                            <div class="letter-flying" id="letter-flying">✉️</div>
                        </div>
                    </div>
                    <div class="letter-paper-wrapper" id="letter-paper-wrapper">
                        <div class="elegant-paper" style="padding: 0; margin: 0;">
                            <div class="paper-border">
                                <svg class="border-svg" viewBox="0 0 400 685" preserveAspectRatio="none">
                                    <rect x="15" y="15" width="370" height="655" rx="3" ry="3" fill="none" stroke="#8b6914" stroke-width="3"/>
                                    <rect x="25" y="25" width="350" height="635" rx="2" ry="2" fill="none" stroke="#8b6914" stroke-width="1"/>
                                    
                                    <g class="corner-ornament tl">
                                        <path d="M15,15 L60,15 L60,25 L25,25 L25,60 L15,60 Z" fill="#8b6914"/>
                                        <path d="M30,30 L55,30 L55,35 L35,35 L35,55 L30,55 Z" fill="#8b6914" opacity="0.6"/>
                                    </g>
                                    
                                    <g class="corner-ornament tr">
                                        <path d="M385,15 L340,15 L340,25 L375,25 L375,60 L385,60 Z" fill="#8b6914"/>
                                        <path d="M370,30 L345,30 L345,35 L365,35 L365,55 L370,55 Z" fill="#8b6914" opacity="0.6"/>
                                    </g>
                                    
                                    <g class="corner-ornament bl">
                                        <path d="M15,670 L60,670 L60,660 L25,660 L25,625 L15,625 Z" fill="#8b6914"/>
                                        <path d="M30,655 L55,655 L55,650 L35,650 L35,630 L30,630 Z" fill="#8b6914" opacity="0.6"/>
                                    </g>
                                    
                                    <g class="corner-ornament br">
                                        <path d="M385,670 L340,670 L340,660 L375,660 L375,625 L385,625 Z" fill="#8b6914"/>
                                        <path d="M370,655 L345,655 L345,650 L365,650 L365,630 L370,630 Z" fill="#8b6914" opacity="0.6"/>
                                    </g>
                                    
                                    <line x1="60" y1="30" x2="340" y2="30" stroke="#8b6914" stroke-width="0.5" stroke-dasharray="2,4"/>
                                    <line x1="60" y1="655" x2="340" y2="655" stroke="#8b6914" stroke-width="0.5" stroke-dasharray="2,4"/>
                                    <line x1="30" y1="60" x2="30" y2="625" stroke="#8b6914" stroke-width="0.5" stroke-dasharray="2,4"/>
                                    <line x1="370" y1="60" x2="370" y2="625" stroke="#8b6914" stroke-width="0.5" stroke-dasharray="2,4"/>
                                </svg>
                                
                                <div class="floral-top">
                                    <div class="floral-line"></div>
                                    <div class="floral-center">
                                        <div class="floral-icon">⚜</div>
                                    </div>
                                    <div class="floral-line"></div>
                                </div>
                                
                                <div class="floral-bottom">
                                    <div class="floral-line"></div>
                                    <div class="floral-center">
                                        <div class="floral-icon">❧</div>
                                    </div>
                                    <div class="floral-line"></div>
                                </div>
                            </div>
                            
                            <div class="paper-header">
                                <div class="header-ornament left">
                                    <svg viewBox="0 0 40 100" class="ornament-svg">
                                        <path d="M20,10 Q30,30 20,50 Q10,70 20,90" stroke="#8b6914" stroke-width="1.5" fill="none"/>
                                        <circle cx="20" cy="25" r="4" fill="#d4a84b"/>
                                        <circle cx="20" cy="75" r="4" fill="#d4a84b"/>
                                        <path d="M15,40 Q20,50 25,40" stroke="#8b6914" stroke-width="1" fill="none"/>
                                        <path d="M15,60 Q20,50 25,60" stroke="#8b6914" stroke-width="1" fill="none"/>
                                    </svg>
                                </div>
                                <div class="header-title">
                                    <div class="title-text">E.V.A.N</div>
                                    <div class="title-subtitle">Eternal Vampire Alliance Network</div>
                                </div>
                                <div class="header-ornament right">
                                    <svg viewBox="0 0 40 100" class="ornament-svg" style="transform: scaleX(-1);">
                                        <path d="M20,10 Q30,30 20,50 Q10,70 20,90" stroke="#8b6914" stroke-width="1.5" fill="none"/>
                                        <circle cx="20" cy="25" r="4" fill="#d4a84b"/>
                                        <circle cx="20" cy="75" r="4" fill="#d4a84b"/>
                                        <path d="M15,40 Q20,50 25,40" stroke="#8b6914" stroke-width="1" fill="none"/>
                                        <path d="M15,60 Q20,50 25,60" stroke="#8b6914" stroke-width="1" fill="none"/>
                                    </svg>
                                </div>
                            </div>
                            
                            <div class="paper-content-area" style="padding-bottom: 0;">
                                <div class="paper-scroll-wrapper">
                                    <div class="paper-content" id="reply-content"></div>
                                </div>
                            </div>
                            
                            <div class="paper-footer" style="padding-top: 15px; padding-bottom: 40px;">
                                <div class="signature-area">
                                    <div class="signature-ornament">
                                        <span class="ornament-left">﹋</span>
                                        <span class="signature-text" style="font-size: 18px;">陆沉</span>
                                        <span class="ornament-right">﹋</span>
                                    </div>
                                    <div class="signature-bat">🦇</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="letter-actions">
                        <button class="close-reply-btn" id="close-reply-btn">
                            <span class="btn-icon">📥</span>
                            <span class="btn-text">收下回信</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 信箱弹窗 -->
        <div class="letter-modal" id="mailbox-modal">
            <div class="letter-modal-content mailbox">
                <div class="letter-header">
                    <div class="header-icon">📬</div>
                    <h3>我的信箱</h3>
                    <span class="mail-count" id="mail-count">0</span>
                    <button class="close-btn" id="mailbox-close-btn">✕</button>
                </div>
                <div class="letter-body mailbox-body">
                    <div class="mailbox-stats">
                        <div class="stat-item">
                            <span class="stat-value" id="total-letters">0</span>
                            <span class="stat-label">总信件</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value unread" id="unread-letters">0</span>
                            <span class="stat-label">未读</span>
                        </div>
                    </div>
                    <div class="mail-list" id="mail-list">
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>信箱是空的</p>
                            <button class="write-first-btn" id="write-first-btn">写第一封信</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 信件详情弹窗 -->
        <div class="letter-modal" id="letter-detail-modal">

                    </div>

        <!-- 一起听歌模式 -->
        <div class="music-mode">
                <h4>一起听歌</h4>
                <button class="music-toggle-btn" id="music-toggle-btn">开启听歌模式</button>
                <div class="music-player" id="music-player" style="display: none;">
                    <div class="music-info">
                        <div class="music-title" id="music-title">未选择歌曲</div>
                        <div class="music-controls">
                            <button class="music-btn" id="music-prev">⏮</button>
                            <button class="music-btn" id="music-play-pause">▶</button>
                            <button class="music-btn" id="music-next">⏭</button>
                        </div>
                        <div class="music-progress">
                            <div class="progress-bar" id="progress-bar">
                                <div class="progress-fill" id="progress-fill"></div>
                            </div>
                            <div class="music-time">
                                <span id="current-time">0:00</span>
                                <span id="total-time">0:00</span>
                            </div>
                        </div>
                    </div>
                    <div class="music-list" id="music-list">

                    </div>
                </div>
            </div>
        </div>
    </div>
